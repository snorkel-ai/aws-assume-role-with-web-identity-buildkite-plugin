name: OIDC Assume AWS Role
description: Assume an AWS IAM role using a Buildkite OIDC token
author: https://github.com/buildkite
requirements:
  - aws
  - jq
configuration:
  properties:
    credential-name-prefix:
      type: string
    hook:
      type: string
    role-arn:
      type: string
    role-session-name:
      type: string
    role-session-duration:
      type: integer
    oidc-token-lifetime:
      type: integer
      description: "Lifetime in seconds for the OIDC token (default: 900 when role-session-duration is set)"
    region:
      type: string
    session-tags:
      type: array
  required:
    - role-arn
  additionalProperties: false
